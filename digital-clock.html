<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="clock-styles.css">
</head>
<body>
    <div class="clock-container">
        <h1>World Time Zones</h1>
        
        <!-- Local Time -->
        <div class="clock-card">
            <div class="timezone-name">Local Time</div>
            <div class="digital-clock" id="localClock">00:00:00</div>
        </div>

        <!-- Cape Town (SAST) -->
        <div class="clock-card">
            <div class="timezone-name">Cape Town (SAST)</div>
            <div class="digital-clock" id="capetownClock">00:00:00</div>
        </div>

        <!-- London (GMT/BST) -->
        <div class="clock-card">
            <div class="timezone-name">London (GMT/BST)</div>
            <div class="digital-clock" id="londonClock">00:00:00</div>
        </div>

        <!-- New York (EST/EDT) -->
        <div class="clock-card">
            <div class="timezone-name">New York (EST/EDT)</div>
            <div class="digital-clock" id="newyorkClock">00:00:00</div>
        </div>

        <!-- Tokyo (JST) -->
        <div class="clock-card">
            <div class="timezone-name">Tokyo (JST)</div>
            <div class="digital-clock" id="tokyoClock">00:00:00</div>
        </div>

        <!-- Sydney (AEDT/AEST) -->
        <div class="clock-card">
            <div class="timezone-name">Sydney (AEDT/AEST)</div>
            <div class="digital-clock" id="sydneyClock">00:00:00</div>
        </div>

        <!-- Dubai (GST) -->
        <div class="clock-card">
            <div class="timezone-name">Dubai (GST)</div>
            <div class="digital-clock" id="dubaiClock">00:00:00</div>
        </div>

        <!-- Paris (CET/CEST) -->
        <div class="clock-card">
            <div class="timezone-name">Paris (CET/CEST)</div>
            <div class="digital-clock" id="parisClock">00:00:00</div>
        </div>
    </div>

    <script src="clock-script.js"></script>
</body>
</html>
